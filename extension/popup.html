<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouTube Shopee Tagger</title>
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 10px;
      text-align: center;
    }
    .status {
      margin: 15px 0;
      font-weight: bold;
      color: #333;
    }
    .running { color: green; }
    .stopped { color: red; }
    button {
      background-color: #ff0000;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover {
      background-color: #cc0000;
    }
  </style>
</head>
<body>
  <h3>YT Shopee Tagger</h3>
  <div id="status" class="status stopped">Trạng thái: ĐÃ DỪNG</div>
  <button id="toggleBtn">BẬT TỰ ĐỘNG GẮN THẺ</button>
  <script src="popup.js"></script>
</body>
</html>
